<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlurpSlop</title>
  <link rel="stylesheet" href="../css/popup.css" </head>

<body>
  <!-- Name, icon, slogan -->
  <div id="header">
    <div class="flex align-center">
      <img src="/icons/icon.svg" alt="SlopSlurp Icon">
      <h1>SlurpSlop</h1>
    </div>
    <p>Get better search results.</p>
  </div>

  <!-- Master switch -->
  <div class="section" id="master-switch">
    <label class="input-container" id="master-container">
      <input type="checkbox" id="extension-toggle" class="button" checked />
      <span class="slider" id="master-slider"></span>
    </label>
    <p>Extension is <span id="status">enabled.</span></p>
  </div>


  <section id="can-be-hidden">
    <!-- Extension stats -->
    <div class="section" id="stats">
      <div id="removed-count-div">
        <span id="total-removed-count">0</span>
        <p>total removed</p>
      </div>
      <div>
        <div class="individual-stat">
          <p>AI Overview </p>
          <p><span id="ai-removed-count">0</span></p>
        </div>
        <div class="individual-stat">
          <p>Low-Quality Websites</p>
          <p><span id="low-quality-removed-count">0</span></p>
        </div>
        <div class="individual-stat">
          <p>Advertisements</p>
          <p><span id="ads-removed-count">0</span></p>
        </div>
      </div>
    </div>

    <!-- Options -->
    <div class="section">
      <div class="options-div">
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="ai-toggle" class="button" checked />
            <span class="slider"></span>
          </label>
          <p>AI Overview</p>
        </div>
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="low-quality-toggle" class="button" checked />
            <span class="slider"></span>
          </label>
          <p>Low-Quality Websites</p>
        </div>
      </div>
      <div class="options-div">
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="ads-toggle" class="button" checked />
            <span class="slider"></span>

          </label>
          <p>Advertisements</p>
        </div>
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="hide-ai-mode-toggle" class="button" checked />
            <span class="slider"></span>
          </label>
          <p>AI Mode Button</p>
        </div>
      </div>
    </div>

    <!-- Modes -->
    <div class="section">
      <div class="options-div">
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="minimalist-toggle" class="button" checked />
            <span class="slider"></span>
          </label>
          <p>Minimalist</p>
        </div>
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="links-only-toggle" class="button" checked />
            <span class="slider"></span>
          </label>
          <p>Links-Only</p>
        </div>
      </div>
      <div class="options-div">
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="academic-toggle" class="button" checked />
            <span class="slider"></span>
          </label>
          <p>Academic</p>
        </div>
        <div class="option">
          <label class="input-container">
            <input type="checkbox" id="placeholders-toggle" class="button" checked />
            <span class="slider"></span>
          </label>
          <p>Placeholders</p>
        </div>
      </div>
    </div>

    <!-- Website whitelist -->
    <!-- TODO: i aint tryna do alla this so one of yall can handle this lmao -e -->
    <div>
      <label>
        <input type="text" id="whitelist-input">
      </label>
      <div id="whitelist-display"></div>
      <div id="add-to-whitelist"></div>
      <div id="clear-whitelist"></div>
    </div>


    <!-- Misc -->
    <!-- TODO: same with this stuff lmao -->
    <div>
      <div id="report-issue"></div>
      <div id="view-source"></div>
      <div id="show-help"></div>
      <div id="toggle-logging"></div>
    </div>
  </section>


  <script src="js/popup.js"></script>

</body>

</html>
