name: Release Management

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      create_release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Bump version
      id: version
      working-directory: chrome-remove-ai-overview
      run: |
        # Get current version
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        echo "Current version: $CURRENT_VERSION"
        
        # Bump version
        npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version
        
        # Get new version
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "New version: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        
        # Update manifest.json version
        node -e "
          const manifest = require('./manifest.json');
          manifest.version = '$NEW_VERSION';
          require('fs').writeFileSync('./manifest.json', JSON.stringify(manifest, null, 2) + '\n');
        "
        
        echo "Updated versions in package.json and manifest.json"

    - name: Commit version bump
      run: |
        git add chrome-remove-ai-overview/package.json chrome-remove-ai-overview/manifest.json
        git commit -m "🔖 Bump version to ${{ steps.version.outputs.new_version }}"
        git push origin main

    - name: Create and push tag
      if: github.event.inputs.create_release == 'true'
      run: |
        git tag v${{ steps.version.outputs.new_version }}
        git push origin v${{ steps.version.outputs.new_version }}

  trigger-build:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
    - name: Trigger main build workflow
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'build-extension.yml',
            ref: 'main',
            inputs: {
              create_release: '${{ github.event.inputs.create_release }}'
            }
          });