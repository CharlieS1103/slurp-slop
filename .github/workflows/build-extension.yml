name: Build and Deploy SlopSlurp Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build and package extension
      run: npm run package

    - name: Get version from package.json
      id: version
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Deploy to build branch
      run: |
        # Configure git
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Create orphan build branch (completely separate from main)
        git checkout --orphan build
        
        # Remove all files from working directory
        git rm -rf .
        
        # Copy only the ZIP file
        cp slopslurp-v${{ steps.version.outputs.version }}.zip .
        
        # Create simple README
        cat > README.md << 'EOF'
        # SlopSlurp Extension - Build
        
        ## Ready-to-Install Chrome Extension
        
        Download `slopslurp-v${{ steps.version.outputs.version }}.zip` and install:
        
        1. Download the ZIP file
        2. Extract it 
        3. Open `chrome://extensions/`
        4. Enable "Developer mode"
        5. Click "Load unpacked" and select the extracted folder
        
        ---
        
        **Version:** ${{ steps.version.outputs.version }}  
        **Built:** $(date -u)  
        **Commit:** ${{ github.sha }}
        EOF
        
        # Add and commit
        git add .
        git commit -m "🚀 Deploy SlopSlurp v${{ steps.version.outputs.version }}"
        
        # Force push to build branch
        git push origin build --force