name: Build and Deploy SlopSlurp Extension

on:
  push:
    branches: [ main ]
    paths:
      - 'chrome-remove-ai-overview/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'chrome-remove-ai-overview/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-extension:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'chrome-remove-ai-overview/package-lock.json'

    - name: Install dependencies
      working-directory: chrome-remove-ai-overview
      run: npm ci

    - name: Lint code
      working-directory: chrome-remove-ai-overview
      run: npm run lint

    - name: Build extension
      working-directory: chrome-remove-ai-overview
      run: npm run build

    - name: Package extension
      working-directory: chrome-remove-ai-overview
      run: npm run package

    - name: Get version from package.json
      id: version
      working-directory: chrome-remove-ai-overview
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Create build artifacts
      run: |
        mkdir -p build-artifacts
        cp chrome-remove-ai-overview/slopslurp-v${{ steps.version.outputs.version }}.zip build-artifacts/
        cp chrome-remove-ai-overview/manifest.json build-artifacts/
        echo "Build Date: $(date)" > build-artifacts/build-info.txt
        echo "Commit: ${{ github.sha }}" >> build-artifacts/build-info.txt
        echo "Version: ${{ steps.version.outputs.version }}" >> build-artifacts/build-info.txt

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: slopslurp-extension-v${{ steps.version.outputs.version }}
        path: build-artifacts/
        retention-days: 90

    - name: Deploy to build branch
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        # Configure git
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Create or checkout build branch
        git checkout -B build
        
        # Clear build branch except .git
        find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
        
        # Copy build artifacts
        cp -r build-artifacts/* .
        
        # Copy the built extension directory for easy access
        cp -r chrome-remove-ai-overview/dist/ extension/
        
        # Create README for build branch
        cat > README.md << 'EOF'
        # SlopSlurp Extension - Build Branch
        
        This branch contains the latest built version of the SlopSlurp Chrome extension.
        
        ## Quick Download
        
        📦 **Latest Build**: `slopslurp-v${{ steps.version.outputs.version }}.zip`
        
        ## Installation
        
        1. Download the ZIP file above
        2. Extract it
        3. Open `chrome://extensions/` in Chrome
        4. Enable "Developer mode"
        5. Click "Load unpacked" and select the extracted folder
        
        ## What's Included
        
        - `slopslurp-v${{ steps.version.outputs.version }}.zip` - Complete extension package
        - `extension/` - Unpacked extension files
        - `manifest.json` - Extension manifest
        - `build-info.txt` - Build metadata
        
        ## Build Information
        
        - **Version**: ${{ steps.version.outputs.version }}
        - **Build Date**: $(date)
        - **Commit**: ${{ github.sha }}
        - **Branch**: ${{ github.ref_name }}
        
        ---
        
        🔙 [Back to source code](../../tree/main)
        EOF
        
        # Add and commit all files
        git add .
        git commit -m "🚀 Build v${{ steps.version.outputs.version }} - $(date '+%Y-%m-%d %H:%M:%S')"
        
        # Push to build branch
        git push origin build --force

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: SlopSlurp v${{ steps.version.outputs.version }}
        body: |
          ## SlopSlurp Extension v${{ steps.version.outputs.version }}
          
          Professional search results by slurping up AI Overview slop, low-quality sites, and advertisements from Google Search.
          
          ### 📦 Installation
          
          1. Download `slopslurp-v${{ steps.version.outputs.version }}.zip` below
          2. Extract the ZIP file
          3. Open `chrome://extensions/` in Chrome
          4. Enable "Developer mode" (top right toggle)
          5. Click "Load unpacked" and select the extracted folder
          
          ### ✨ Features
          
          - 🤖 **AI Overview Removal**: Removes Google's AI-generated summaries
          - 📚 **Low-Quality Site Filtering**: Blocks SparkNotes, LitCharts, and other homework sites  
          - 📢 **Ad Blocking**: Removes sponsored results and shopping ads
          - 🎓 **Academic Mode**: Enhances searches for scholarly research
          - ⚡ **Minimalist Mode**: Lightweight AI Overview removal only
          - 🛡️ **Smart Auto-Disable**: Automatically disables when searching for filtered content
          - 📊 **Performance Stats**: Track what's been filtered per page
          - 🎨 **Site Whitelist**: Protect specific sites from filtering
          
          ### 🔄 Quick Access
          
          - **Build Branch**: [Latest builds](../../tree/build)
          - **Source Code**: [Main branch](../../tree/main)
          - **Issues**: [Report bugs](../../issues)
          
          ---
          
          **Build Info**: Commit ${{ github.sha }} • Built on $(date)
        files: |
          chrome-remove-ai-overview/slopslurp-v${{ steps.version.outputs.version }}.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Comment on PR with build info
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const version = '${{ steps.version.outputs.version }}';
          const runId = '${{ github.run_id }}';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🏗️ Build Complete!\n\n**Extension Version**: v${version}\n\n📦 **Download build artifacts**: [slopslurp-extension-v${version}](../actions/runs/${runId})\n\n🔍 **What was built**:\n- Extension ZIP package\n- Minified and optimized files\n- Linting passed ✅\n\n*This build will be deployed to the \`build\` branch when merged to main.*`
          });

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: build-extension
    if: failure()
    
    steps:
    - name: Notify on build failure
      uses: actions/github-script@v7
      with:
        script: |
          if (context.eventName === 'push') {
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'SlopSlurp extension build failed',
              context: 'ci/build-extension'
            });
          }