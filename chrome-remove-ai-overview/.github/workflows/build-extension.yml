name: Build and Deploy Extension

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'chrome-remove-ai-overview/package-lock.json'

    - name: Change to extension directory
      run: cd chrome-remove-ai-overview

    - name: Install dependencies
      run: |
        cd chrome-remove-ai-overview
        npm ci

    - name: Run linting
      run: |
        cd chrome-remove-ai-overview
        npm run lint || echo "Linting issues found but continuing build"

    - name: Format code
      run: |
        cd chrome-remove-ai-overview
        npm run format

    - name: Build extension
      run: |
        cd chrome-remove-ai-overview
        npm run build

    - name: Create ZIP package
      run: |
        cd chrome-remove-ai-overview
        npm run zip

    - name: Get version from package.json
      id: version
      run: |
        cd chrome-remove-ai-overview
        echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: slopslurp-v${{ steps.version.outputs.version }}
        path: chrome-remove-ai-overview/slopslurp-v${{ steps.version.outputs.version }}.zip
        retention-days: 90

    - name: Upload dist folder
      uses: actions/upload-artifact@v4
      with:
        name: extension-dist
        path: chrome-remove-ai-overview/dist/
        retention-days: 30

    # Deploy to build branch on main push
    - name: Deploy to build branch
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cd chrome-remove-ai-overview
        
        # Configure git
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Create or switch to build branch
        git checkout -B build
        
        # Remove everything except dist, package files, and .git
        find . -maxdepth 1 -name ".*" -not -name ".git" -not -name ".github" -exec rm -rf {} + 2>/dev/null || true
        find . -maxdepth 1 -type f -not -name "slopslurp-v*.zip" -exec rm -f {} + 2>/dev/null || true
        find . -maxdepth 1 -type d -not -name "." -not -name ".git" -not -name "dist" -exec rm -rf {} + 2>/dev/null || true
        
        # Copy dist contents to root
        if [ -d "dist" ]; then
          cp -r dist/* .
          rm -rf dist/
        fi
        
        # Create installation README
        cat > README.md << 'EOF'
        # SlopSlurp - Ready to Install
        
        ## Quick Install
        
        1. Download the latest `slopslurp-v*.zip` file from this branch
        2. Extract the ZIP file
        3. Open Chrome and go to `chrome://extensions/`
        4. Enable "Developer mode" (toggle in top right)
        5. Click "Load unpacked" and select the extracted folder
        
        ## Features
        
        - 🤖 **Smart AI Overview Detection** - Automatically detects and removes AI-generated content
        - 🎯 **Dual Filtering Modes** - Comprehensive and minimalist filtering options
        - 📊 **Real-time Statistics** - Track blocked content per page
        - 🌍 **Multilingual Support** - Works across different Google domains
        - 🎨 **Minimalist UI** - Clean, distraction-free interface
        - 🔧 **Custom Whitelist** - Allow specific sites when needed
        
        ## Auto-Built Files
        
        This branch is automatically updated when code is pushed to main. All files are:
        - ✅ Linted and formatted
        - 🗜️ Minified for performance  
        - 📦 Ready for Chrome installation
        - 🔄 Auto-deployed via GitHub Actions
        
        ---
        
        **Version:** $(cat manifest.json | grep -o '"version": "[^"]*' | cut -d'"' -f4)  
        **Built:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
        **Branch:** build (auto-updated)
        EOF
        
        # Stage all changes
        git add -A
        
        # Commit if there are changes
        if ! git diff --staged --quiet; then
          git commit -m "🚀 Auto-deploy SlopSlurp v${{ steps.version.outputs.version }}
          
          Built from main branch commit: ${{ github.sha }}
          
          Changes:
          - Updated extension files
          - Minified for production
          - Ready for Chrome installation
          
          Install: Download slopslurp-v${{ steps.version.outputs.version }}.zip"
          
          # Push to build branch
          git push origin build --force
        else
          echo "No changes to deploy"
        fi

    - name: Create release on main
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
        release_name: SlopSlurp v${{ steps.version.outputs.version }}
        body: |
          ## SlopSlurp v${{ steps.version.outputs.version }}
          
          ### 🚀 Installation
          Download `slopslurp-v${{ steps.version.outputs.version }}.zip` below and load as unpacked extension in Chrome.
          
          ### 📊 Build Info
          - **Commit:** ${{ github.sha }}
          - **Build:** #${{ github.run_number }}
          - **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ### 🔧 Ready-to-Install Extension
          Visit the [build branch](https://github.com/${{ github.repository }}/tree/build) for easy installation.
        draft: false
        prerelease: false

    - name: Upload release asset
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: chrome-remove-ai-overview/slopslurp-v${{ steps.version.outputs.version }}.zip
        asset_name: slopslurp-v${{ steps.version.outputs.version }}.zip
        asset_content_type: application/zip